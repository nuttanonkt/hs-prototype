const DB_KEY = 'hs_prototype_db';
const FIREBASE_URL = 'https://hs-prototype-8698f-default-rtdb.asia-southeast1.firebasedatabase.app';
let syncing = false;

function getDB() {
  const raw = localStorage.getItem(DB_KEY);
  if (raw) return JSON.parse(raw);
  return seedData();
}

function saveDB(db) {
  localStorage.setItem(DB_KEY, JSON.stringify(db));
  pushPromise = pushToFirebase(db);
}

async function saveDBAndWait(db) {
  localStorage.setItem(DB_KEY, JSON.stringify(db));
  await pushToFirebase(db);
}

let pushPromise = Promise.resolve();

async function pushToFirebase(db) {
  try {
    const toSave = JSON.parse(JSON.stringify(db));
    delete toSave.session;
    await fetch(FIREBASE_URL + '/data.json', {method:'PUT', body:JSON.stringify(toSave), headers:{'Content-Type':'application/json'}});
  } catch(e) { console.log('Firebase push failed:', e); }
}

function fixArrays(obj) {
  if (obj === null || obj === undefined) return obj;
  if (typeof obj !== 'object') return obj;
  if (Array.isArray(obj)) return obj.map(fixArrays).filter(x=>x!==null);
  const keys = Object.keys(obj);
  const isNumeric = keys.length > 0 && keys.every((k,i) => String(i) === k);
  if (isNumeric) return keys.map(k => fixArrays(obj[k])).filter(x=>x!==null);
  const fixed = {};
  for (const k of keys) fixed[k] = fixArrays(obj[k]);
  return fixed;
}

// Merge: union of arrays by ID — keeps both Firebase + local items
function mergeArrays(fbArr, localArr) {
  const map = new Map();
  for (const item of (fbArr||[])) { if(item?.id) map.set(item.id, item); }
  for (const item of (localArr||[])) { if(item?.id) map.set(item.id, item); } // local wins for same ID
  return [...map.values()];
}

function mergeDB(fbData, localData) {
  return {
    users: mergeArrays(fbData.users, localData.users),
    hotels: mergeArrays(fbData.hotels, localData.hotels),
    offenders: mergeArrays(fbData.offenders, localData.offenders),
    incidents: mergeArrays(fbData.incidents, localData.incidents),
    pendingHotels: fbData.pendingHotels || localData.pendingHotels || [],
    session: localData.session,
  };
}

async function pullFromFirebase() {
  if (syncing) return;
  syncing = true;
  try {
    await pushPromise; // wait for pending push first
    const res = await fetch(FIREBASE_URL + '/data.json');
    let data = await res.json();
    if (data && data.users) {
      data = fixArrays(data);
      const local = getDB();
      const merged = mergeDB(data, local);
      localStorage.setItem(DB_KEY, JSON.stringify(merged));
      // Push merged data back so Firebase has everything
      pushPromise = pushToFirebase(merged);
    }
  } catch(e) { console.log('Firebase pull failed, using local:', e); }
  syncing = false;
}

async function initDB() {
  try {
    const res = await fetch(FIREBASE_URL + '/data.json');
    let data = await res.json();
    if (data && data.users) {
      data = fixArrays(data);
      const local = getDB();
      const merged = mergeDB(data, local);
      localStorage.setItem(DB_KEY, JSON.stringify(merged));
      pushPromise = pushToFirebase(merged);
    } else {
      const db = seedData();
      await pushToFirebase(db);
    }
  } catch(e) {
    getDB();
  }
}

// ===================== AUTH =====================
function login(email, password) {
  const db = getDB();
  const user = db.users.find(u => u.email === email && u.password === password);
  if (!user) return null;
  if (user.role === 'hotel') {
    const hotel = db.hotels.find(h => h.id === user.hotelId);
    if (hotel && hotel.status === 'suspended') return {error:'suspended'};
    if (hotel && hotel.status === 'rejected') return {error:'rejected'};
    if (hotel && hotel.status === 'pending') return {error:'pending'};
  }
  db.session = {userId:user.id,role:user.role,hotelId:user.hotelId};
  saveDB(db);
  return user;
}

function logout() {
  const db = getDB();
  db.session = null;
  saveDB(db);
  navigate('#/');
}

function getSession() {
  return getDB().session;
}

function getCurrentUser() {
  const s = getSession();
  if (!s) return null;
  return getDB().users.find(u => u.id === s.userId);
}

function getCurrentHotel() {
  const s = getSession();
  if (!s || !s.hotelId) return null;
  return getDB().hotels.find(h => h.id === s.hotelId);
}

// ===================== DATE HELPERS =====================
const TH_MONTHS = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
function fmtDate(dateStr) {
  if (!dateStr) return '-';
  const [y,m,d] = dateStr.split('-');
  return `${parseInt(d)} ${TH_MONTHS[parseInt(m)-1]} ${y}`;
}
function fmtDateTime(dateStr, timeStr) {
  if (!dateStr) return '-';
  return `${fmtDate(dateStr)}${timeStr ? ', '+timeStr+' น.' : ''}`;
}
function timeAgo(dateStr) {
  if (!dateStr) return '';
  const diff = Math.floor((Date.now() - new Date(dateStr).getTime()) / 86400000);
  if (diff === 0) return 'วันนี้';
  if (diff === 1) return 'เมื่อวาน';
  if (diff < 7) return diff + ' วันที่แล้ว';
  if (diff < 30) return Math.floor(diff/7) + ' สัปดาห์ที่แล้ว';
  return Math.floor(diff/30) + ' เดือนที่แล้ว';
}

// ===================== FILE HELPERS =====================
function readFilesAsBase64(fileInput) {
  return Promise.all([...fileInput.files].map(file => {
    return new Promise((resolve) => {
      // Resize images to max 400px for storage
      if (file.type.startsWith('image/')) {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX = 1400;
            let w = img.width, h = img.height;
            if (w > MAX || h > MAX) {
              if (w > h) { h = h * MAX / w; w = MAX; }
              else { w = w * MAX / h; h = MAX; }
            }
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            resolve({ name: file.name, type: file.type, dataUrl: canvas.toDataURL('image/jpeg', 0.9) });
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      } else {
        resolve({ name: file.name, type: file.type, dataUrl: null });
      }
    });
  }));
}

function openLightbox(src, name) {
  const overlay = document.createElement('div');
  overlay.className = 'fixed inset-0 bg-black/70 flex items-center justify-center z-[9999] cursor-pointer';
  overlay.style.backdropFilter = 'blur(4px)';
  overlay.onclick = () => overlay.remove();
  overlay.innerHTML = `<div class="relative max-w-3xl max-h-[85vh] mx-4" onclick="event.stopPropagation()">
    <img src="${src}" alt="${name}" class="max-w-full max-h-[80vh] rounded-lg shadow-2xl">
    <div class="text-white text-sm text-center mt-3">${name}</div>
    <button onclick="this.closest('.fixed').remove()" class="absolute -top-3 -right-3 w-8 h-8 bg-white rounded-full flex items-center justify-center text-gray-700 shadow-lg hover:bg-gray-100 cursor-pointer font-bold">✕</button>
  </div>`;
  document.body.appendChild(overlay);
}

function renderFilePreview(doc) {
  if (typeof doc === 'string') {
    const isImg = /\.(jpg|jpeg|png|gif|webp)$/i.test(doc);
    return `<div class="border rounded-lg overflow-hidden w-44 cursor-pointer hover:shadow-md transition-shadow">
      <div class="bg-gray-100 h-24 flex items-center justify-center text-2xl">${isImg?'🖼':'📄'}</div>
      <div class="p-2 text-xs text-gray-500 truncate">${doc}</div>
    </div>`;
  }
  if (doc.dataUrl && doc.type?.startsWith('image/')) {
    const escaped = doc.dataUrl.replace(/'/g, "\\'");
    const nameEsc = (doc.name||'').replace(/'/g, "\\'");
    return `<div class="border rounded-lg overflow-hidden w-44 cursor-pointer hover:shadow-md transition-shadow" onclick="openLightbox('${escaped}','${nameEsc}')">
      <img src="${doc.dataUrl}" class="h-24 w-full object-cover" alt="${doc.name}">
      <div class="p-2 text-xs text-gray-500 truncate">${doc.name}</div>
    </div>`;
  }
  return `<div class="border rounded-lg overflow-hidden w-44">
    <div class="bg-gray-100 h-24 flex items-center justify-center text-2xl">📄</div>
    <div class="p-2 text-xs text-gray-500 truncate">${doc.name||doc}</div>
  </div>`;
}

}

function handleLogin(e) {
  e.preventDefault();
  const email = document.getElementById('login-email').value;
  const pass = document.getElementById('login-pass').value;
  const result = login(email, pass);
  if (!result) { toast('อีเมลหรือรหัสผ่านไม่ถูกต้อง','error'); return; }
  if (result.error === 'suspended') { navigate('#/suspended'); return; }

  if (result.error === 'pending') { navigate('#/pending'); return; }
  toast('เข้าสู่ระบบสำเร็จ','success');
  navigate('#/dashboard');
}

async function handleRegister(e) {
  e.preventDefault();
  const db = getDB();
  const hid = 'h' + Date.now();
  const uid = 'u' + Date.now();
  const email = document.getElementById('reg-email').value;
  if (db.users.find(u=>u.email===email)) { toast('อีเมลนี้มีอยู่ในระบบแล้ว','error'); return; }
  const fileInput = document.getElementById('reg-docs');
  const docs = fileInput.files.length ? await readFilesAsBase64(fileInput) : [];
  const hotel = {
    id:hid,name:document.getElementById('reg-name').value,
    address:document.getElementById('reg-address').value,
    contact:document.getElementById('reg-contact').value,
    phone:document.getElementById('reg-phone').value,
    email:email,license:document.getElementById('reg-license').value,
    status:'pending',registeredAt:new Date().toISOString().split('T')[0],
    documents:docs
  };
  const user = {id:uid,email:email,password:document.getElementById('reg-pass').value,role:'hotel',hotelId:hid,name:hotel.contact};
  db.hotels.push(hotel);
  db.users.push(user);
  await saveDBAndWait(db);
  navigate('#/consent');
}

function pageSearch() {
  const db = getDB();
  render(hotelLayout(`

function doSearch() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  const db = getDB();
  let results = db.offenders;
  if (q) {
    results = db.offenders.filter(o =>
      o.name.toLowerCase().includes(q) || o.nameTh.includes(q) ||
      o.idCard.replace(/-/g,'').includes(q.replace(/-/g,'')) ||
      o.passport.toLowerCase().includes(q)
    );
  }
  const container = document.getElementById('search-results');
  if (!results.length) {
    container.innerHTML = `<div class="text-center py-16"><div class="text-5xl mb-4">🔍</div><h3 class="font-semibold text-gray-600 mb-2">ไม่พบข้อมูลบุคคล</h3><p class="text-sm text-gray-400 mb-6">ลองค้นหาด้วยคำอื่น</p><a href="#/create-incident" class="btn btn-primary">＋ รายงานเหตุการณ์ใหม่</a></div>`;
    return;
  }
  container.innerHTML = results.map(o => {
    const incCount = db.incidents.filter(i=>i.offenderId===o.id).length;
    const blacklisted = db.incidents.some(i=>i.offenderId===o.id && i.blacklistStatus==='blacklisted');
    return `<div class="card mb-3 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <div class="w-12 h-12 bg-gray-200 rounded-full flex items-center justify-center text-xl">👤</div>
        <div>
          <div class="font-semibold">${o.name} <span class="text-gray-400 text-sm">(${o.nameTh})</span></div>
          <div class="text-sm text-gray-500">บัตร: ${o.idCard}${o.passport?' | พาสปอร์ต: '+o.passport:''}</div>
          <div class="flex gap-2 mt-1">${blacklisted?'<span class="badge badge-blacklisted text-xs">อยู่ในบัญชีดำ</span>':''}<span class="text-xs text-gray-400">${incCount} เหตุการณ์</span></div>
        </div>
      </div>
      <a href="#/offender/${o.id}" class="btn btn-secondary text-sm !py-2">ดูรายละเอียด</a>
    </div>`;
  }).join('');
}

async function handleCreateIncident(e) {
  e.preventDefault();
  const db = getDB();
  const s = getSession();
  let offId = document.getElementById('inc-offender').value;
  if (offId === '__new') {
    const name = document.getElementById('new-off-name').value;
    const idCard = document.getElementById('new-off-id').value;
    if (!name || !idCard) { toast('กรุณากรอกข้อมูลผู้ก่อเหตุ','error'); return; }
    offId = 'o' + Date.now();
    db.offenders.push({id:offId,name:name,nameTh:document.getElementById('new-off-nameth').value||name,idCard:idCard,passport:'',nationality:document.getElementById('new-off-nat').value||'ไทย',dob:'',photo:null});
  }
  const incFileInput = document.querySelector('#inc-files');
  const incFiles = incFileInput?.files?.length ? await readFilesAsBase64(incFileInput) : [];
  const inc = {
    id:'inc'+Date.now(),
    type:document.getElementById('inc-type').value,
    date:document.getElementById('inc-date').value,
    time:document.getElementById('inc-time').value,
    hotelId:s.hotelId,offenderId:offId,
    description:document.getElementById('inc-desc').value,
    attachments:incFiles,blacklistStatus:'reviewing',adminNote:'',createdBy:s.userId
  };
  db.incidents.push(inc);
  await saveDBAndWait(db);
  toast('ส่งรายงานเหตุการณ์สำเร็จ','success');
  navigate('#/my-incidents');
}

      <a href="#/admin-incidents/all" class="stat-card"><div class="flex items-center justify-between"><span class="text-3xl font-bold">${db.incidents.length}</span><span class="text-2xl opacity-40">📋</span></div><div class="text-sm text-gray-500 mt-2">เหตุการณ์ทั้งหมด</div></a>
      <a href="#/admin-incidents/reviewing" class="stat-card border-red-200 bg-red-50/50"><div class="flex items-center justify-between"><span class="text-3xl font-bold text-red-600">${reviewingCount}</span><span class="text-2xl opacity-40">🔍</span></div><div class="text-sm text-gray-500 mt-2">รอดำเนินการ</div></a>
    </div>
    <div class="grid grid-cols-2 gap-6">
      <div class="card"><h3 class="font-semibold mb-4">⏳ สมาชิกรอการอนุมัติ</h3>
        ${pendingHotels.length?sortByDate(pendingHotels).map(h=>`<div class="flex items-center justify-between py-3 border-b border-gray-100 last:border-0">
          <div><div class="font-medium">${h.name}</div><div class="text-xs text-gray-400">${fmtDate(h.registeredAt)} &middot; ${timeAgo(h.registeredAt)}</div></div>
          <a href="#/admin-member/${h.id}" class="btn btn-primary text-xs !py-1.5 !px-4">ตรวจสอบ</a>
        </div>`).join(''):'<div class="text-center py-8 text-gray-400">ไม่มีรายการรออนุมัติ ✅</div>'}
      </div>
      <div class="card"><h3 class="font-semibold mb-4">📋 เหตุการณ์ล่าสุด</h3>
        ${recentInc.map(inc=>{const h=db.hotels.find(x=>x.id===inc.hotelId);return `<a href="#/admin-incident/${inc.id}" class="flex items-center justify-between py-3 border-b border-gray-100 last:border-0 hover:bg-gray-50 -mx-2 px-2 rounded cursor-pointer">
          <div class="flex-1 min-w-0"><div class="font-medium truncate">${h?.name||'-'}</div><div class="text-xs text-gray-400">${inc.type} &middot; ${fmtDateTime(inc.date,inc.time)}</div></div>
          <div class="ml-3 flex-shrink-0">${badgeStatus(inc.blacklistStatus)}</div>
        </a>`}).join('')}
      </div>
    </div>
  `,'admin-dashboard'));
}

function pageAdminMembers(filter) {
  const db = getDB();
  let hotels = sortByDate(db.hotels);
  if (filter && filter !== 'all') hotels = hotels.filter(h => h.status === filter);
  const allHotels = db.hotels;
  const hCounts = {all:allHotels.length, pending:allHotels.filter(h=>h.status==='pending').length, active:allHotels.filter(h=>h.status==='active').length, rejected:allHotels.filter(h=>h.status==='rejected').length};
  const statusOptions = [{v:'all',l:'ทั้งหมด'},{v:'pending',l:'รอการอนุมัติ'},{v:'active',l:'ใช้งานอยู่'},{v:'rejected',l:'ถูกปฏิเสธ'}];
  const cur = filter || 'all';
  render(adminLayout(`
    <div class="flex justify-between items-center mb-6"><h1 class="text-xl font-bold">สมาชิก</h1></div>
    <div class="card">
      <div class="flex gap-3 mb-4 items-center">
        <input class="input flex-1" placeholder="🔍  ค้นหาชื่อโรงแรม..." id="member-search" oninput="filterMembers()">
      </div>
      <div class="flex gap-2 mb-4 border-b pb-3">${statusOptions.map(s=>`<a href="#/admin-members/${s.v}" class="px-4 py-2 rounded-full text-sm font-medium transition-all ${cur===s.v?'bg-primary text-white shadow-sm':'bg-gray-100 text-gray-600 hover:bg-gray-200'}">${s.l} <span class="${cur===s.v?'bg-white/20 text-white':'bg-white text-gray-500'} ml-1 px-2 py-0.5 rounded-full text-xs">${hCounts[s.v]}</span></a>`).join('')}</div>
      <table><thead><tr><th>#</th><th>ชื่อโรงแรม</th><th>ผู้ติดต่อ</th><th>โทรศัพท์</th><th>วันที่สมัคร</th><th>สถานะ</th><th></th></tr></thead><tbody id="members-tbody">
      ${hotels.length?hotels.map((h,i)=>`<tr data-name="${h.name}"><td>${i+1}</td><td>${h.name}</td><td>${h.contact}</td><td>${h.phone}</td><td>${h.registeredAt}</td><td>${badgeStatus(h.status)}</td><td><a href="#/admin-member/${h.id}" class="text-primary text-sm hover:underline">ดูรายละเอียด</a></td></tr>`).join(''):'<tr><td colspan="7" class="text-center py-8 text-gray-400">ไม่มีรายการ</td></tr>'}
      </tbody></table>
    </div>
  `,'admin-members'));
}

function filterMembers() {
  const q = document.getElementById('member-search').value.toLowerCase();
  document.querySelectorAll('#members-tbody tr').forEach(tr => {
    tr.style.display = tr.dataset.name.toLowerCase().includes(q) ? '' : 'none';
  });
}

function pageAdminMemberDetail(hotelId) {
  const db = getDB();
  const h = db.hotels.find(x=>x.id===hotelId);
  if (!h) { navigate('#/admin-members'); return; }
  render(adminLayout(`
    <div class="text-sm text-gray-500 mb-4"><a href="#/admin-members" class="hover:text-primary">สมาชิก</a> / ${h.name}</div>
    <div class="grid grid-cols-3 gap-6">
      <div class="col-span-2 card">
        <h3 class="font-semibold mb-3">ข้อมูลโรงแรม</h3><hr class="mb-4">
        <div class="grid grid-cols-2 gap-y-4 text-sm">
          <div><span class="text-gray-500">ชื่อโรงแรม</span><div class="font-medium mt-1">${h.name}</div></div>
          <div><span class="text-gray-500">ที่อยู่</span><div class="font-medium mt-1">${h.address}</div></div>
          <div><span class="text-gray-500">ผู้ติดต่อ</span><div class="font-medium mt-1">${h.contact}</div></div>
          <div><span class="text-gray-500">โทรศัพท์</span><div class="font-medium mt-1">${h.phone}</div></div>
          <div><span class="text-gray-500">อีเมล</span><div class="font-medium mt-1">${h.email}</div></div>
          <div><span class="text-gray-500">ใบอนุญาต</span><div class="font-medium mt-1">${h.license}</div></div>
        </div>
        <h4 class="font-semibold text-sm mt-6 mb-3">เอกสารที่ส่งมา</h4><hr class="mb-3">
        <div class="flex flex-wrap gap-3">${(h.documents||[]).length?(h.documents||[]).map(d=>renderFilePreview(d)).join(''):'<span class="text-sm text-gray-400">ไม่มีเอกสาร</span>'}</div>
      </div>
      <div>
        <div class="card mb-4"><h3 class="font-semibold mb-3">สถานะ</h3><hr class="mb-3">
          <div>${badgeStatus(h.status)}</div>
          <div class="text-xs text-gray-500 mt-2">สมัคร: ${h.registeredAt}</div>
        </div>
        <div class="card">
          <h3 class="font-semibold mb-3">การดำเนินการ</h3><hr class="mb-3">
          <textarea class="input mb-3 text-sm" placeholder="เพิ่มหมายเหตุ (ไม่บังคับ)" id="admin-note-${h.id}" rows="2"></textarea>
          <button onclick="adminApprove('${h.id}')" class="btn btn-success w-full mb-2">อนุมัติสมาชิก</button>
          <button onclick="adminReject('${h.id}')" class="btn btn-danger w-full">ปฏิเสธ</button>
        </div>
      </div>
    </div>
  `,'admin-members'));
}

async function adminApprove(hid) {
  const db=getDB(); const h=db.hotels.find(x=>x.id===hid);
  if(h){h.status='active';await saveDBAndWait(db);toast('อนุมัติสมาชิกสำเร็จ','success');navigate('#/admin-members');}
}
async function adminReject(hid) {
  const db=getDB(); const h=db.hotels.find(x=>x.id===hid);
  if(h){h.status='rejected';await saveDBAndWait(db);toast('ปฏิเสธสมาชิกแล้ว','info');navigate('#/admin-members');}
}

function pageAdminIncidents(filter) {
  const db = getDB();
  let incidents = sortByDate(db.incidents);
  if (filter && filter !== 'all') incidents = incidents.filter(i => i.blacklistStatus === filter);
  const allInc = db.incidents;
  const counts = {all:allInc.length, reviewing:allInc.filter(i=>i.blacklistStatus==='reviewing').length, blacklisted:allInc.filter(i=>i.blacklistStatus==='blacklisted').length, dismissed:allInc.filter(i=>i.blacklistStatus==='dismissed').length};
  const statusOptions = [{v:'all',l:'ทั้งหมด',color:''},{v:'reviewing',l:'รอตรวจสอบ',color:'text-yellow-600'},{v:'blacklisted',l:'บัญชีดำ',color:'text-red-600'},{v:'dismissed',l:'ยกเว้น',color:'text-gray-500'}];
  const cur = filter || 'all';
  render(adminLayout(`
    <div class="flex justify-between items-center mb-6"><h1 class="text-xl font-bold">เหตุการณ์</h1></div>
    <div class="card">
      <div class="flex gap-3 mb-4 items-center">
        <input class="input flex-1" placeholder="🔍  ค้นหาโรงแรมหรือผู้ก่อเหตุ..." id="ainc-search" oninput="filterAdminIncidents()">
      </div>
      <div class="flex gap-2 mb-4 border-b pb-3">${statusOptions.map(s=>`<a href="#/admin-incidents/${s.v}" class="px-4 py-2 rounded-full text-sm font-medium transition-all ${cur===s.v?'bg-primary text-white shadow-sm':'bg-gray-100 text-gray-600 hover:bg-gray-200'}">${s.l} <span class="${cur===s.v?'bg-white/20 text-white':'bg-white text-gray-500'} ml-1 px-2 py-0.5 rounded-full text-xs">${counts[s.v]}</span></a>`).join('')}</div>
      <table><thead><tr><th>#</th><th>ผู้ก่อเหตุ</th><th>ประเภท</th><th>รายงานโดย</th><th>วันที่</th><th>บัญชีดำ</th><th></th></tr></thead><tbody id="ainc-tbody">
      ${incidents.length?incidents.map((inc,i)=>{
        const off=db.offenders.find(o=>o.id===inc.offenderId);
        const hotel=db.hotels.find(h=>h.id===inc.hotelId);
        return `<tr data-search="${off?.name||''} ${hotel?.name||''}"><td>${i+1}</td><td>${off?.name||'-'}</td><td>${inc.type}</td><td>${hotel?.name||'-'}</td><td>${inc.date}</td><td>${badgeStatus(inc.blacklistStatus)}</td><td><a href="#/admin-incident/${inc.id}" class="text-primary text-sm hover:underline">ตรวจสอบ</a></td></tr>`;
      }).join(''):'<tr><td colspan="7" class="text-center py-8 text-gray-400">ไม่มีรายการ</td></tr>'}
      </tbody></table>
    </div>
  `,'admin-incidents'));
}

function filterAdminIncidents() {
  const q = document.getElementById('ainc-search').value.toLowerCase();
  document.querySelectorAll('#ainc-tbody tr').forEach(tr => {
    tr.style.display = (tr.dataset.search||'').toLowerCase().includes(q) ? '' : 'none';
  });
}

function pageAdminIncidentDetail(incId) {
  const db=getDB();
  const inc=db.incidents.find(x=>x.id===incId);
  if(!inc){navigate('#/admin-incidents');return;}
  const off=db.offenders.find(o=>o.id===inc.offenderId);
  const hotel=db.hotels.find(h=>h.id===inc.hotelId);
  render(adminLayout(`
    <div class="text-sm text-gray-500 mb-4"><a href="#/admin-incidents" class="hover:text-primary">เหตุการณ์</a> / ${inc.id.toUpperCase()}</div>
    <div class="grid grid-cols-3 gap-6">
      <div class="col-span-2">
        <div class="card mb-6">
          <h3 class="font-semibold mb-3">ข้อมูลเหตุการณ์</h3><hr class="mb-4">
          <div class="grid grid-cols-2 gap-y-4 text-sm">
            <div><span class="text-gray-500">ประเภท</span><div class="font-medium mt-1">${inc.type}</div></div>
            <div><span class="text-gray-500">วันที่</span><div class="font-medium mt-1">${inc.date}</div></div>
            <div><span class="text-gray-500">เวลา</span><div class="font-medium mt-1">${inc.time}</div></div>
            <div><span class="text-gray-500">โรงแรม</span><div class="font-medium mt-1">${hotel?.name||'-'}</div></div>
          </div>
          <div class="mt-4 text-sm"><span class="text-gray-500">รายละเอียด</span><div class="font-medium mt-1">${inc.description}</div></div>
          <hr class="my-4"><h4 class="font-semibold text-sm mb-3">ไฟล์แนบ</h4>
          <div class="flex gap-3">${(inc.attachments||[]).length?(inc.attachments||[]).map(f=>renderFilePreview(f)).join(''):'<span class="text-sm text-gray-400">ไม่มีไฟล์แนบ</span>'}</div>
        </div>
      </div>
      <div>
        <div class="card mb-4"><h3 class="font-semibold mb-3">ข้อมูลผู้ก่อเหตุ</h3><hr class="mb-3">
          ${off?`<div class="text-sm space-y-2"><div><span class="text-gray-500">ชื่อ-นามสกุล</span><div class="font-medium">${off.name}</div></div><div><span class="text-gray-500">เลขบัตร</span><div class="font-medium">${off.idCard}</div></div><div><span class="text-gray-500">สัญชาติ</span><div class="font-medium">${off.nationality}</div></div></div>`:''}
        </div>
        <div class="card mb-4"><h3 class="font-semibold mb-3">สถานะปัจจุบัน</h3><hr class="mb-3">
          ${badgeStatus(inc.blacklistStatus)}
          <div class="text-xs text-gray-400 mt-2">${db.incidents.filter(i=>i.offenderId===inc.offenderId&&i.blacklistStatus==='blacklisted').length} เหตุการณ์ที่ยืนยันก่อนหน้านี้</div>
        </div>
        <div class="card">
          <h3 class="font-semibold mb-3">การตัดสินใจ</h3><hr class="mb-3">
          <textarea class="input mb-3 text-sm" id="bl-note-${inc.id}" rows="2" placeholder="หมายเหตุผู้ดูแลระบบ (ไม่บังคับ)"></textarea>
          <hr class="my-3"><p class="text-xs text-gray-500 mb-3">การดำเนินการบัญชีดำ</p>
          <button onclick="adminBlacklist('${inc.id}')" class="btn btn-danger w-full mb-2">เพิ่มบุคคลนี้ในบัญชีดำ</button>
          <button onclick="adminDismiss('${inc.id}')" class="btn btn-secondary w-full">ยกเว้น (ไม่ดำเนินการ)</button>
          <p class="text-xs text-gray-400 mt-3">บัญชีดำจะมีผลทันทีกับทุกโรงแรมในระบบ</p>
        </div>
      </div>
    </div>
  `,'admin-incidents'));
}

async function adminBlacklist(incId) {
  const db=getDB();const inc=db.incidents.find(x=>x.id===incId);
  if(inc){inc.blacklistStatus='blacklisted';inc.adminNote=document.getElementById('bl-note-'+incId)?.value||'';await saveDBAndWait(db);toast('เพิ่มในบัญชีดำแล้ว','success');navigate('#/admin-incidents');}
}
async function adminDismiss(incId) {
  const db=getDB();const inc=db.incidents.find(x=>x.id===incId);
  if(inc){inc.blacklistStatus='dismissed';inc.adminNote=document.getElementById('bl-note-'+incId)?.value||'';await saveDBAndWait(db);toast('ยกเว้นเรียบร้อย','info');navigate('#/admin-incidents');}
}

// ===================== INIT =====================
(async () => {
  await initDB();
  router();
})();
</script>
</body>
</html>
